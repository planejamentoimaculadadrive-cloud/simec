<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Planejamento Pedagógico 2026</title>
    <style>
        /* MANTIDO TODO O SEU ESTILO ORIGINAL */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { background: #fff; max-width: 600px; margin: 0 auto; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header-status { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; padding: 15px; background: #eef4ff; border-radius: 8px; border: 1px solid #d1e3ff; }
        .info-tag { background: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; color: #1a73e8; border: 1px solid #1a73e8; display: flex; align-items: center; }
        h2 { color: #1a73e8; margin-bottom: 20px; text-align: center; font-size: 24px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; color: #333; }
        select, input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; outline: none; }
        .bncc-box { background: #f8f9fa; padding: 18px; border-radius: 10px; border: 1px solid #e0e0e0; border-left: 6px solid #1a73e8; margin: 20px 0; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #1557b0; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; padding: 15px; border-radius: 8px; display: none; }
        .sucesso { background: #e6f4ea; color: #1e8e3e; display: block !important; border: 1px solid #1e8e3e; } 
        .erro { background: #fce8e6; color: #d93025; display: block !important; border: 1px solid #d93025; }
        .btn-voltar-topo { text-decoration: none; color: #1a73e8; font-weight: bold; display: inline-block; margin-bottom: 10px; }
        
        #tema { resize: vertical; min-height: 80px; margin-bottom: 15px; font-family: inherit; }

        #habilidadesContainer { 
            background: white; border: 1px solid #ccc; border-radius: 8px; 
            padding: 10px; max-height: 200px; overflow-y: auto; margin-top: 5px;
        }
        .habilidade-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; }
        .habilidade-item:last-child { border-bottom: none; }
        .habilidade-item input { width: auto; margin-top: 4px; cursor: pointer; }
        .habilidade-item label { font-weight: normal; font-size: 13px; margin: 0; cursor: pointer; line-height: 1.4; }
    </style>
</head>
<body>

<div style="max-width: 600px; margin: 0 auto;">
    <a href="Painel.html" class="btn-voltar-topo">⬅️ Voltar Painel 🖥️</a>
</div>

<div class="container">
    <div class="header-status">
        <div class="info-tag" id="infoProf">👤 Professor: ...</div>
        <div class="info-tag" id="infoEscola">🏫 Escola: ...</div>
        <div class="info-tag" id="infoTurma">👥 Turma: ...</div>
        <div class="info-tag" id="infoBimestre">📅 Bimestre: ...</div>
    </div>

    <h2 id="tituloPagina">Planejamento de Aula</h2>

    <form id="formPlanejamento">
        <div class="grid">
            <div class="campo">
                <label>Data da Aula</label>
                <input type="date" id="dataAula" required>
            </div>
            <div class="campo">
                <label>Total de Aulas</label>
                <input type="number" id="qtdAulas" required>
            </div>
        </div>

        <div class="bncc-box">
            <div class="grid">
                <div class="campo">
                    <label>Área de Conhecimento</label>
                    <select id="area" onchange="filtrarSeries()" required><option value="">Carregando...</option></select>
                </div>
                <div class="campo">
                    <label>Ano/Série</label>
                    <select id="serie" onchange="filtrarPraticas()" required><option value="">Aguardando...</option></select>
                </div>
            </div>
            <label>Práticas de Linguagem</label>
            <select id="pratica" onchange="filtrarObjetos()" required style="margin-bottom: 15px;"><option value="">Aguardando...</option></select>
            <label>Objetos de Conhecimento</label>
            <select id="objeto" onchange="filtrarHabilidades()" required style="margin-bottom: 15px;"><option value="">Aguardando...</option></select>
            
            <label>Habilidades BNCC (Marque as desejadas)</label>
            <div id="habilidadesContainer">
                <span style="font-size: 12px; color: #888;">Selecione o Objeto primeiro...</span>
            </div>
        </div>

        <label>Tema / Subtema</label>
        <textarea id="tema" rows="3" required placeholder="Digite o tema..."></textarea>
        
        <label>Sugestões Metodológicas</label>
        <textarea id="metodologia" rows="4" required></textarea>

        <button type="submit" id="btnSalvar">💾 Salvar Planejamento</button>
        <div id="status"></div>
    </form>
</div>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxXrSQVjDjz9zEE46OVSEYR5muSVCjGVLRG8PpJiYC8cFHB-coCd1avS6y2Yh3TJpPD/exec";
    let bancoBNCC = [];
    let configPrivada = JSON.parse(localStorage.getItem('configAula'));
    let nomeProfessor = localStorage.getItem('nomeProfessor');

    window.onload = async () => {
        if(!nomeProfessor || !configPrivada) { window.location.href = "index.html"; return; }
        
        document.getElementById('infoProf').innerText = "👤 " + nomeProfessor;
        document.getElementById('infoEscola').innerText = "🏫 " + configPrivada.escola;
        document.getElementById('infoTurma').innerText = "👥 " + configPrivada.turma;
        document.getElementById('infoBimestre').innerText = "📅 " + configPrivada.bimestre;

        try {
            const resBNCC = await fetch(URL_SCRIPT + "?getBNCC=true");
            bancoBNCC = await resBNCC.json();
            
            const areas = [...new Set(bancoBNCC.map(i => i.area))];
            const selArea = document.getElementById('area');
            selArea.innerHTML = '<option value="">-- Selecione a Área --</option>';
            areas.forEach(a => selArea.innerHTML += `<option value="${a}">${a}</option>`);

            const dadosRecuperados = JSON.parse(localStorage.getItem('dadosEdicao'));
            if (dadosRecuperados && dadosRecuperados.id) {
                await buscarEPreencher(dadosRecuperados.id);
                localStorage.removeItem('dadosEdicao'); 
            }
        } catch (e) { console.error(e); }
    };

    async function buscarEPreencher(id) {
        const btn = document.getElementById('btnSalvar');
        btn.disabled = true;
        btn.innerText = "Buscando dados na planilha... aguarde";

        try {
            const response = await fetch(`${URL_SCRIPT}?getRegistroUnico=true&id=${id}`);
            const d = await response.json();

            if (d && !d.status) {
                if (d.data) document.getElementById('dataAula').value = new Date(d.data).toISOString().split('T')[0];
                document.getElementById('qtdAulas').value = d.aulas || "";
                document.getElementById('tema').value = d.tema || "";
                document.getElementById('metodologia').value = d.metodologia || "";

                const setSelect = async (idSel, valor) => {
                    const el = document.getElementById(idSel);
                    return new Promise(resolve => {
                        let t = 0;
                        const inv = setInterval(() => {
                            if (Array.from(el.options).some(o => o.value === valor)) {
                                el.value = valor;
                                el.dispatchEvent(new Event('change'));
                                clearInterval(inv);
                                resolve();
                            }
                            if (t++ > 25) { clearInterval(inv); resolve(); }
                        }, 200);
                    });
                };

                await setSelect('area', d.area);
                await setSelect('serie', d.serie);
                await setSelect('pratica', d.pratica);
                await setSelect('objeto', d.objeto);

                if(d.habilidade) {
                    const lista = d.habilidade.split(' | ');
                    document.querySelectorAll('#habilidadesContainer input').forEach(cb => {
                        if(lista.includes(cb.value)) cb.checked = true;
                    });
                }

                document.getElementById('formPlanejamento').setAttribute('data-id', d.id);
                document.getElementById('formPlanejamento').setAttribute('data-linha', d.linha);
                document.getElementById('tituloPagina').innerText = "📝 Editar Registro";
                btn.innerText = "Atualizar Planejamento";
            }
        } catch (err) {
            alert("Erro ao buscar dados para edição.");
        } finally {
            btn.disabled = false;
        }
    }

    function filtrarSeries() {
        const area = document.getElementById('area').value;
        const series = [...new Set(bancoBNCC.filter(i => i.area === area).map(i => i.serie))];
        const sel = document.getElementById('serie');
        sel.innerHTML = '<option value="">-- Selecione o Ano --</option>';
        series.forEach(s => sel.innerHTML += `<option value="${s}">${s}</option>`);
        limparCamposAbaixo('serie');
    }
    function filtrarPraticas() {
        const area = document.getElementById('area').value;
        const serie = document.getElementById('serie').value;
        const praticas = [...new Set(bancoBNCC.filter(i => i.area === area && i.serie === serie).map(i => i.pratica))];
        const sel = document.getElementById('pratica');
        sel.innerHTML = '<option value="">-- Selecione a Prática --</option>';
        praticas.forEach(p => sel.innerHTML += `<option value="${p}">${p}</option>`);
        limparCamposAbaixo('pratica');
    }
    function filtrarObjetos() {
        const area = document.getElementById('area').value;
        const serie = document.getElementById('serie').value;
        const pratica = document.getElementById('pratica').value;
        const objetos = [...new Set(bancoBNCC.filter(i => i.area === area && i.serie === serie && i.pratica === pratica).map(i => i.objeto))];
        const sel = document.getElementById('objeto');
        sel.innerHTML = '<option value="">-- Selecione o Objeto --</option>';
        objetos.forEach(o => sel.innerHTML += `<option value="${o}">${o}</option>`);
        limparCamposAbaixo('objeto');
    }
    function filtrarHabilidades() {
        const area = document.getElementById('area').value;
        const serie = document.getElementById('serie').value;
        const pratica = document.getElementById('pratica').value;
        const objeto = document.getElementById('objeto').value;
        const container = document.getElementById('habilidadesContainer');
        container.innerHTML = ''; 
        const filtradas = bancoBNCC.filter(i => i.area === area && i.serie === serie && i.pratica === pratica && i.objeto === objeto);
        if(filtradas.length === 0) {
            container.innerHTML = '<span style="font-size: 12px; color: #888;">Nenhuma habilidade encontrada.</span>';
            return;
        }
        filtradas.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'habilidade-item';
            div.innerHTML = `<input type="checkbox" id="habil_${index}" value="${item.habilidade}">
                             <label for="habil_${index}">${item.habilidade}</label>`;
            container.appendChild(div);
        });
    }
    function limparCamposAbaixo(campo) {
        if(campo === 'serie') document.getElementById('pratica').innerHTML = '<option value="">Aguardando...</option>';
        if(campo === 'pratica' || campo === 'serie') document.getElementById('objeto').innerHTML = '<option value="">Aguardando...</option>';
        document.getElementById('habilidadesContainer').innerHTML = '<span style="font-size: 12px; color: #888;">Selecione o Objeto primeiro...</span>';
    }

    document.getElementById('formPlanejamento').onsubmit = async (e) => {
        e.preventDefault();
        const marcadas = Array.from(document.querySelectorAll('#habilidadesContainer input:checked')).map(cb => cb.value).join(' | ');
        if(!marcadas) { alert("Marque ao menos uma habilidade!"); return; }

        const btn = document.getElementById('btnSalvar');
        const status = document.getElementById('status');
        const idParaEditar = e.target.getAttribute('data-id') || "";
        const linhaParaEditar = e.target.getAttribute('data-linha') || "";

        btn.disabled = true;
        btn.innerText = "Salvando...";
        status.className = "";
        status.innerText = "Enviando para a planilha...";
        status.style.display = "block";

        const dados = {
            id: String(idParaEditar),
            linha: String(linhaParaEditar),
            escola: configPrivada.escola,
            professor: nomeProfessor,
            turno: configPrivada.turno,
            turma: configPrivada.turma,
            bimestre: configPrivada.bimestre,
            data: document.getElementById('dataAula').value,
            aulas: document.getElementById('qtdAulas').value,
            area: document.getElementById('area').value,
            serie: document.getElementById('serie').value,
            pratica: document.getElementById('pratica').value,
            objeto: document.getElementById('objeto').value,
            habilidade: marcadas,
            tema: document.getElementById('tema').value,
            metodologia: document.getElementById('metodologia').value,
            acao: idParaEditar ? "EDITAR_RESPOSTA" : "SALVAR_RESPOSTA" 
        };

        const formData = new URLSearchParams();
        for (const key in dados) { formData.append(key, dados[key]); }

        try {
            await fetch(URL_SCRIPT, { method: "POST", body: formData, mode: 'no-cors' });
            status.className = "sucesso";
            status.innerText = idParaEditar ? "✅ Alteração Salva!" : "✅ Salvo com sucesso!";
            
            // REMOVIDO O RESET(): Agora o formulário mantém os dados na tela como na imagem
            
            btn.disabled = false;
            btn.innerText = idParaEditar ? "Atualizar Novamente" : "💾Salvar Novo Planejamento"; 
            window.scrollTo({ top: 0, behavior: 'smooth' });
            setTimeout(() => { status.style.display = "none"; }, 5000);
        } catch (error) {
            status.className = "erro"; status.innerText = "❌ Erro ao salvar.";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
